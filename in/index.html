<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLECLOUD AI 绘画</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>IDLECLOUD AI 绘画</h1>
        <div class="form-group" style="display: none;">
            <label for="apiKey">API Key</label>
            <input type="hidden" id="apiKey">
        </div>
        <div class="form-group">
            <label for="positivePrompt">正向提示词</label>
            <textarea id="positivePrompt" rows="5" placeholder="描述您想生成的图像内容，例如：1girl, very aesthetic, masterpiece"></textarea>
        </div>
        <div class="form-group">
            <label for="negativePrompt">反向提示词</label>
            <textarea id="negativePrompt" rows="5" placeholder="描述您不希望在图像中出现的内容，例如：nsfw, lowres, bad anatomy"></textarea>
        </div>
        <div class="settings-grid">
            <div class="form-group">
                <label for="width">宽度 (Width)</label>
                <input type="number" id="width" value="1216" step="64">
            </div>
            <div class="form-group">
                <label for="height">高度 (Height)</label>
                <input type="number" id="height" value="832" step="64">
            </div>
            <div class="form-group">
                <label for="steps">步数 (Steps)</label>
                <input type="number" id="steps" value="28" max="28" min="1">
            </div>
            <div class="form-group">
                <label for="scale">相关性 (Scale)</label>
                <input type="number" id="scale" value="5" step="0.5" max="10">
            </div>
             <div class="form-group">
                <label for="seed">种子 (Seed)</label>
                <input type="number" id="seed" placeholder="留空则随机">
            </div>
        </div>
        <button id="generateBtn">生成图像</button>
        <div id="status"></div>
        <div id="result-container">
            <h2>生成结果</h2>
            <div id="image-gallery"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
