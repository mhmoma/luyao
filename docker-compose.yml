version: '3.8'

services:
  sassy-sister-bot:
    build: .
    container_name: sassy-sister-bot
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      # ====================================================================
      # =================== MANDATORY CONFIGURATIONS =======================
      # ====================================================================

      # --- Discord Bot Token ---
      # You can get this from the Discord Developer Portal.
      - DISCORD_TOKEN=

      # --- OpenAI-Compatible API Settings ---
      # Your API endpoint, API key, and the model name to use.
      - OPENAI_API_BASE=
      - OPENAI_API_KEY=
      - OPENAI_MODEL_NAME=

      # --- Bot Control Settings ---
      # Your user ID to grant admin privileges.
      - ADMIN_USER_ID=
      # Channel IDs where the bot is allowed to respond.
      # Separate multiple IDs with commas, e.g., "123,456"
      - ALLOWED_CHANNEL_IDS=

      # ====================================================================
      # =================== OPTIONAL CONFIGURATIONS ========================
      # ====================================================================

      # --- Proxy Settings (Optional) ---
      # If you need a proxy to connect to external services.
      # - HTTP_PROXY=http://your-proxy-address:port
      # - HTTPS_PROXY=https://your-proxy-address:port

      # --- Welcome Message (Optional) ---
      # Channel IDs where the bot sends a welcome message.
      # Separate multiple IDs with commas.
      # - WELCOME_CHANNEL_IDS=

      # --- Auto-Cleanup (Optional) ---
      # Channel IDs where the bot will automatically delete messages.
      # Separate multiple IDs with commas.
      # - CLEANUP_CHANNEL_IDS=

      # --- ComfyUI Integration (Optional) ---
      # The address of your ComfyUI server. Defaults to "127.0.0.1:8188".
      # - COMFYUI_SERVER_ADDRESS=127.0.0.1:8188

      # --- IDLECLOUD API (Optional) ---
      # API key for the IDLECLOUD service.
      # - IDLECLOUD_API_KEY=